# argocd-notifications-cm.yaml
#
# Argo CD Notifications configuration.
# Defines notification triggers, templates, and subscriptions.
#
# Prerequisites:
#   kubectl apply -n argocd \
#     -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/notifications_catalog/install.yaml
#
# Create the Slack bot token secret separately:
#   kubectl create secret generic argocd-notifications-secret \
#     -n argocd \
#     --from-literal=slack-token=<YOUR_SLACK_BOT_TOKEN>
#
# Reference:
# https://argo-cd.readthedocs.io/en/stable/operator-manual/notifications/

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-notifications-cm
    app.kubernetes.io/part-of: argocd
data:
  # ---------------------------------------------------------------------------
  # Services (notification channels)
  # ---------------------------------------------------------------------------
  service.slack: |
    token: $slack-token
    username: ArgoCD
    icon: ":argo:"

  # ---------------------------------------------------------------------------
  # Templates
  # ---------------------------------------------------------------------------
  template.app-sync-succeeded: |
    slack:
      attachments: |
        [{
          "color": "#18be52",
          "title": "{{.app.metadata.name}} — Sync Succeeded",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "fields": [
            { "title": "Revision", "value": "{{.app.status.sync.revision}}", "short": true },
            { "title": "Environment", "value": "{{.app.metadata.labels.environment}}", "short": true }
          ]
        }]

  template.app-sync-failed: |
    slack:
      attachments: |
        [{
          "color": "#E96D76",
          "title": "{{.app.metadata.name}} — Sync Failed",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "fields": [
            { "title": "Revision", "value": "{{.app.status.sync.revision}}", "short": true },
            { "title": "Message",  "value": "{{.app.status.operationState.message}}", "short": false }
          ]
        }]

  template.app-health-degraded: |
    slack:
      attachments: |
        [{
          "color": "#E96D76",
          "title": "{{.app.metadata.name}} — Health Degraded",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "fields": [
            { "title": "Environment", "value": "{{.app.metadata.labels.environment}}", "short": true }
          ]
        }]

  # ---------------------------------------------------------------------------
  # Triggers — conditions that activate a notification
  # ---------------------------------------------------------------------------
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # ---------------------------------------------------------------------------
  # Subscriptions — which apps send to which channel via which trigger
  # ---------------------------------------------------------------------------
  # Applications subscribe by adding this annotation:
  #   notifications.argoproj.io/subscribe.on-sync-succeeded.slack: "#deployments"
  #   notifications.argoproj.io/subscribe.on-sync-failed.slack: "#alerts"
  #   notifications.argoproj.io/subscribe.on-health-degraded.slack: "#alerts"
  #
  # Default subscription for all applications (applies unless overridden):
  defaultTriggers: |
    - on-sync-failed
    - on-health-degraded

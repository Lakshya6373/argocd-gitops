# apps/dev/sample-app.yaml
#
# Explicit Application manifest for dev environment.
# This approach (one YAML per env) is the simplest mental model and is ideal
# when learning ArgoCD. At scale, replace all three envs with the ApplicationSet
# in applicationsets/sample-app-appset.yaml instead.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: sample-app
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: team-alpha

  source:
    repoURL: https://github.com/Lakshya6373/argocd-gitops.git
    targetRevision: HEAD
    path: manifests/sample-app/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: sample-app-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The base layer lists all shared resources.
# Overlays reference this base and add patches on top.
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

# Common labels applied to all resources in this base.
commonLabels:
  app.kubernetes.io/name: sample-app
  app.kubernetes.io/part-of: sample-app

# Default image — overlays override this with the specific version tag.
images:
  - name: sample-app
    newName: nginx
    newTag: "1.27-alpine"

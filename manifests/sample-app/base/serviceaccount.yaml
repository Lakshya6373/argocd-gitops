apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-app
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # If using AWS EKS with IRSA, add the IAM role ARN here:
    # eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/sample-app-role
automountServiceAccountToken: false

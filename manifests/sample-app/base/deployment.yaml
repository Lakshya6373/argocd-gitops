apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/version: "1.0.0"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Replica count is managed by the HPA in staging and prod.
  # For dev, it stays at this value. Overlays patch this for each environment.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
        app.kubernetes.io/version: "1.0.0"
    spec:
      serviceAccountName: sample-app
      automountServiceAccountToken: false

      # Spread pods across nodes to avoid single-node failures.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sample-app

      containers:
        - name: sample-app
          # Image name referenced in kustomization.yaml images transformer.
          image: sample-app
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          env:
            - name: APP_ENV
              value: "base" # Overlays patch this to dev / staging / prod

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

      securityContext:
        fsGroup: 101
        runAsGroup: 101

      # Allow 30 seconds for graceful shutdown before SIGKILL.
      terminationGracePeriodSeconds: 30

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sample-app-staging

resources:
  - ../../base

images:
  - name: sample-app
    newName: nginx
    newTag: "1.27-alpine"

patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: sample-app

commonLabels:
  environment: staging
